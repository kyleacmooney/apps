<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Apps</title>

    <meta name="theme-color" content="#0a0a12" />

    <!-- iOS "Add to Home Screen" -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Apps" />
    <link rel="apple-touch-icon" href="/apps/apple-touch-icon.png" />
  </head>
  <body>
    <!-- Hide body until scroll position is restored to prevent visible jump -->
    <script>
      (function() {
        var base = location.pathname.replace(/\/$/, '') || '/';
        var route = localStorage.getItem(base + ':lastRoute');
        if (route) {
          var hashPath = route.split('?')[0];
          var y = parseInt(localStorage.getItem(base + ':scroll:' + hashPath) || '0', 10);
          if (y > 0) {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.15s ease-in';
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
