name: Promote dev to production

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward merge dev into main
        id: ff-merge
        continue-on-error: true
        run: |
          git checkout main
          git merge --ff-only origin/dev
          git push origin main

      - name: Merge dev into main (non-FF fallback)
        if: steps.ff-merge.outcome == 'failure'
        run: |
          git checkout main
          git merge origin/dev -m "chore: promote dev to production"
          git push origin main

      - name: Trigger deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
