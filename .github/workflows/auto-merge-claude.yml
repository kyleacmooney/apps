name: Auto-merge Claude branches
 
on:
  push:
    branches: ["claude/**"]
 
permissions:
  contents: write
 
jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
 
      - name: Fast-forward merge to main
        id: ff-merge
        continue-on-error: true
        run: |
          git checkout main
          git merge --ff-only ${{ github.sha }}
          git push origin main
 
      - name: Rebase with Claude Code on conflict
        if: steps.ff-merge.outcome == 'failure'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The fast-forward merge of branch ${{ github.ref_name }} to main failed,
            likely due to diverged history. Please:
            1. Run `git checkout ${{ github.ref_name }}`
            2. Run `git rebase main`
            3. If there are merge conflicts, resolve them intelligently by
               understanding the intent of both sides
            4. Run `git rebase --continue` after resolving each conflict
            5. Once the rebase is complete, force-push the rebased branch
            6. Then checkout main, fast-forward merge, and push main
          claude_args: "--max-turns 15 --model claude-sonnet-4-6"
          github_token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Delete branch
        if: always() && (steps.ff-merge.outcome == 'success' || success())
        run: git push origin --delete ${{ github.ref_name }} || true
