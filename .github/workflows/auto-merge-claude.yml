name: Auto-merge Claude branches

on:
  push:
    branches: ["claude/**"]

permissions:
  contents: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge to main
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git checkout main

          # Try fast-forward first
          if git merge --ff-only "$BRANCH_NAME"; then
            echo "Fast-forward merge succeeded"
          else
            # Rebase the branch onto main and retry
            echo "Fast-forward failed, rebasing..."
            git checkout "$BRANCH_NAME"
            git rebase main
            git checkout main
            git merge --ff-only "$BRANCH_NAME"
          fi

          git push origin main

      - name: Delete branch
        if: success()
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: git push origin --delete "$BRANCH_NAME" || true

      # GITHUB_TOKEN pushes don't trigger push-based workflows, but
      # workflow_dispatch IS explicitly exempted from that restriction.
      - name: Trigger deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
