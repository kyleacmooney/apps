name: Auto-merge Claude branches

on:
  push:
    branches: ['claude/**']

permissions:
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge ${{ github.sha }} --ff-only
          git push origin main

      - name: Delete Claude branch
        if: success()
        run: git push origin --delete ${{ github.ref_name }}
