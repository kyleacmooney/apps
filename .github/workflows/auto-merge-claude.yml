name: Auto-merge Claude/Cursor branches

on:
  push:
    branches: ["claude/**", "cursor/**"]

permissions:
  contents: write
  actions: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fast-forward merge to main
        id: ff-merge
        continue-on-error: true
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git checkout main
          git merge --ff-only "$BRANCH_NAME"
          git push origin main

      - name: Rebase with Claude Code on conflict
        if: steps.ff-merge.outcome == 'failure'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "The fast-forward merge of branch $BRANCH_NAME to main failed, likely due to diverged history. Please:
          1. Run \`git checkout $BRANCH_NAME\`
          2. Run \`git rebase main\`
          3. If there are merge conflicts, resolve them intelligently by understanding the intent of both sides
          4. Run \`git rebase --continue\` after resolving each conflict
          5. Once the rebase is complete, force-push the rebased branch
          6. Then checkout main, fast-forward merge, and push main" \
            --max-turns 15 --model claude-sonnet-4-6 --allowedTools "Bash"

      - name: Delete branch
        if: always() && (steps.ff-merge.outcome == 'success' || success())
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: git push origin --delete "$BRANCH_NAME" || true

      # GITHUB_TOKEN pushes don't trigger push-based workflows, but
      # workflow_dispatch IS explicitly exempted from that restriction.
      - name: Trigger deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
