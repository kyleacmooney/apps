name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-app

      - name: Checkout dev
        id: checkout-dev
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-app

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'main-app/package-lock.json'

      - name: Build main
        working-directory: ./main-app
        run: |
          npm ci
          npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Build dev
        if: steps.checkout-dev.outcome == 'success'
        run: |
          cd dev-app
          npm ci
          npx tsc -b
          npx vite build --base=/apps/dev/
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Combine Builds
        run: |
          mkdir -p combined-dist
          cp -r main-app/dist/* combined-dist/
          if [ -d "dev-app/dist" ]; then
            mkdir -p combined-dist/dev
            cp -r dev-app/dist/* combined-dist/dev/
          fi

      - uses: actions/configure-pages@v5
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: combined-dist

      - id: deployment
        uses: actions/deploy-pages@v4
